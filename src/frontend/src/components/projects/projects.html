<div class="panel-card">
    <div class="projects-header">
        <div class="title-wrap">
            <h2 class="section-title">Projects</h2>
        </div>
        <button class="icon-button add-project-btn" (click)="addProject.emit()" aria-label="Add project">
            <svg lucidePlus [size]="15"></svg>
        </button>
    </div>

    <div class="projects-grid">
        <div class="project-card" *ngFor="let project of projects()" (click)="openProject.emit(project)">
            <span class="project-color-bar" [style.background]="project.color"></span>
            <div class="project-card-body">
                <div class="project-card-header">
                    <span class="project-name">{{ project.name }}</span>
                    <span class="project-count">{{ project.completedCount }}/{{ project.totalCount }}</span>
                </div>
                <p class="project-description">{{ project.description }}</p>
                <div class="progress-bar">
                    <div class="progress-bar-fill" [style.width.%]="project.progress * 100"></div>
                </div>
            </div>
        </div>

        <p class="empty-state" *ngIf="projects().length === 0">No projects yet.</p>
    </div>
</div>
