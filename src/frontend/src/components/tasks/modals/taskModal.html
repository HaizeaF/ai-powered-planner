<div class="modal-backdrop" *ngIf="state" (click)="onBackdropClick()">
    <div class="modal-card" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3>{{ isEdit ? "Edit task" : "New task" }}</h3>
            <button class="icon-button close-btn" (click)="close.emit()" aria-label="Close">
                <svg lucideX [size]="20"></svg>
            </button>
        </div>

        <form (ngSubmit)="onSubmit()">
            <label class="field">
                <span>Title</span>
                <input type="text" [(ngModel)]="title" name="title" required maxlength="120" placeholder="E.g. Team meeting" />
            </label>

            <label class="field">
                <span>Description</span>
                <textarea [(ngModel)]="description" name="description" rows="3" placeholder="Optional"></textarea>
            </label>

            <div class="field-row">
                <label class="field">
                    <span>Date</span>
                    <input type="date" [(ngModel)]="date" name="date" required />
                </label>

                <label class="field checkbox-field">
                    <input type="checkbox" [(ngModel)]="hasTime" name="hasTime" />
                    <span>Has time</span>
                </label>

                <label class="field" *ngIf="hasTime">
                    <span>Time</span>
                    <input type="time" [(ngModel)]="time" name="time" />
                </label>
            </div>

            <div class="field-row">
                <label class="field">
                    <span>Type</span>
                    <select [(ngModel)]="type" name="type">
                        <option [value]="TaskType.TASK">Task (completable)</option>
                        <option [value]="TaskType.EVENT">Event</option>
                    </select>
                </label>

                <label class="field">
                    <span>Project</span>
                    <select [(ngModel)]="projectId" name="projectId">
                        <option [ngValue]="null">No project</option>
                        <option *ngFor="let project of projects()" [ngValue]="project.id">
                            {{ project.name }}
                        </option>
                    </select>
                </label>

                <label class="field">
                    <span>Recurrence</span>
                    <select [(ngModel)]="recurrence" name="recurrence">
                        <option [value]="RecurrenceType.NONE">Does not repeat</option>
                        <option [value]="RecurrenceType.DAILY">Daily</option>
                        <option [value]="RecurrenceType.WEEKLY">Weekly</option>
                        <option [value]="RecurrenceType.MONTHLY">Monthly</option>
                    </select>
                </label>
            </div>

            <div class="field-row align-center">
                <label class="field checkbox-field">
                    <input type="checkbox" [(ngModel)]="isFeatured" name="isFeatured" />
                    <span>Featured task (highlighted on the calendar)</span>
                </label>
            </div>

            <div class="field">
                <span>Color</span>
                <div class="color-picker">
                    <button type="button" *ngFor="let c of colors" class="color-swatch" [class.selected]="c === color" [style.background]="c" (click)="color = c"></button>
                </div>
            </div>

            <p class="hint" *ngIf="!isCompletable">This type of task cannot be marked as completed.</p>

            <div class="modal-actions">
                <button type="button" class="btn-danger" *ngIf="isEdit" (click)="onDelete()" [disabled]="saving()">Delete</button>
                <div class="spacer"></div>
                <button type="button" class="btn-secondary" (click)="close.emit()">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="saving()">Save</button>
            </div>
        </form>
    </div>
</div>
